<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Minerva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>
    <div class="login-container">
        <i class="fas fa-cube"></i>
        <h1 class="login-title">PROJETO <span style="color: #00a3ff;">MINERVA</span></h1>
        
        <div style="margin-bottom: 25px; display: flex; justify-content: center;">
            <img src="./images/logominerva.png" alt="Logo Parceria FAETEC ETEVM" style="height: 50px; width: auto;">
        </div>
        
        <p class="login-subtitle">Faça login com sua conta Google para acessar seus cursos, oficinas e materiais técnicos.</p>
        
        <p id="status-validacao" style="color: #ffb703; font-weight: 600; display: none; margin-bottom: 20px; font-size: 14px; line-height: 1.4; text-align: center; max-width: 320px;"></p>

        <button class="btn-google" id="login-btn">
            <i class="fab fa-google" style="color: #ea4335;"></i> Entrar com o Google
        </button>
        
        <div class="login-footer">Plataforma Maker • 2026</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnzxP7kc-qEKumUqyNAlVA_zCqgz3s4qU",
            authDomain: "oficina-3d-minerva.firebaseapp.com", // Domínio corrigido e seguro
            projectId: "oficina-3d-minerva",
            storageBucket: "oficina-3d-minerva.firebasestorage.app",
            messagingSenderId: "241260901502",
            appId: "1:241260901502:web:63fb6e57a446eea876142f",
        };

        // Inicialização estrita usando as dependências globais
        const app = window.firebase.initializeApp(firebaseConfig);
        const auth = window.firebase.auth();
        const provider = new window.firebase.auth.GoogleAuthProvider();

        const APPS_SCRIPT_URL ='https://script.google.com/macros/s/AKfycbz-2YFkVyugCAgGqxhyJKfHVZpCiCuXzt6jGFhZewvy5Sbn4E_C-2sI1Sp5VODZ4ZIfWw/exec';

        async function verificarPermissoesPlanilha(emailUsuario, displayName, photoURL) {
            const statusTxt = document.getElementById('status-validacao');
            if (statusTxt) {
                statusTxt.style.display = "block";
                statusTxt.style.color = "#ffb703";
                statusTxt.innerText = "Verificando permissões na base da FAETEC...";
            }

            let nomeAluno = "Aluno";
            if (displayName) {
                nomeAluno = displayName;
            } else if (emailUsuario) {
                nomeAluno = emailUsuario.split('@')[0];
            }

            const url = `${APPS_SCRIPT_URL}?email=${encodeURIComponent(emailUsuario)}&nome=${encodeURIComponent(nomeAluno)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data || data.autorizado === false) {
                    if (statusTxt) {
                        statusTxt.style.color = "#ef4444";
                        statusTxt.innerHTML = `Acesso Retido:<br><span style='font-size:12px; font-weight:400; color:#94a3b8;'>${data.motivo || "Aguarde a liberação do administrador."}</span>`;
                    }
                    auth.signOut();
                    localStorage.clear();
                    return;
                }

                localStorage.setItem('usuario_nome', nomeAluno);
                localStorage.setItem('usuario_email', emailUsuario);
                localStorage.setItem('usuario_foto', photoURL || '');
                localStorage.setItem('permissoes_minerva', JSON.stringify(data.permissoes));

                window.location.href = "dashboard.html";

            } catch (error) {
                console.error("Erro na comunicação com o Apps Script: ", error);
                if (statusTxt) {
                    statusTxt.style.color = "#ef4444";
                    statusTxt.innerText = "Erro ao conectar com a base de dados de permissões. Tente novamente.";
                }
                auth.signOut();
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                verificarPermissoesPlanilha(user.email, user.displayName, user.photoURL);
            }
        });

        document.getElementById('login-btn').addEventListener('click', function() {
            auth.signInWithPopup(provider)
                .then(function(result) {
                    if(result.user) {
                        verificarPermissoesPlanilha(result.user.email, result.user.displayName, result.user.photoURL);
                    }
                })
                .catch(function(error) {
                    console.error("Erro no login Google Auth: ", error);
                    alert("Erro ao autenticar com o Google: " + error.message);
                });
        });
    </script>
</body>
</html>
