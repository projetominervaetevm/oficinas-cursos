<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDnzxP7kc-qEKumUqyNAlVA_zCqgz3s4qU",
        authDomain: "://firebaseapp.com",
        projectId: "oficina-3d-minerva",
        storageBucket: "oficina-3d-minerva.firebasestorage.app",
        messagingSenderId: "241260901502",
        appId: "1:241260901502:web:63fb6e57a446eea876142f",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // CONFIGURAÇÃO REAL DA SUA PLANILHA (Baseado na imagem enviada)
    const SPREADSHEET_ID = 'AKfycbz4QJOIeDNm9yfWYK1onbsEuvpE_DmITuJqoAVB_o9MGj3DkOxpHY_8FFUooO1JXoXp';
    const GOOGLE_API_KEY = 'https://script.google.com/macros/s/AKfycbz4QJOIeDNm9yfWYK1onbsEuvpE_DmITuJqoAVB_o9MGj3DkOxpHY_8FFUooO1JXoXp/exec'; 
    const RANGE = 'Tabela1!A:C'; // Alterado para bater com o nome "Tabela1" da imagem

    async function verificarPermissoesPlanilha(emailUsuario, displayName, photoURL) {
        const statusTxt = document.getElementById('status-validacao');
        if (statusTxt) {
            statusTxt.style.display = "block";
            statusTxt.innerText = "Verificando permissões na base da FAETEC...";
        }

        const url = `https://googleapis.com{SPREADSHEET_ID}/values/${RANGE}?key=${GOOGLE_API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.values) {
                throw new Error("Planilha vazia ou inacessível.");
            }

            const linhas = data.values.slice(1); // Ignora a linha 1 (cabeçalhos)
            
            // Busca o e-mail do aluno limpando espaços extras
            const dadosAluno = linhas.find(linha => {
                return linha[0] && linha[0].toLowerCase().trim() === emailUsuario.toLowerCase().trim();
            });

            if (dadosAluno) {
                // Captura os valores das colunas B (curso_3d) e C (curso_dron)
                const valor3D = dadosAluno[1] ? dadosAluno[1].toLowerCase().trim() : 'não';
                const valorDrone = dadosAluno[2] ? dadosAluno[2].toLowerCase().trim() : 'não';

                const tem3D = (valor3D === 'sim');
                const temDrone = (valorDrone === 'sim');

                // Se o e-mail está na planilha, mas ambas as colunas estão como "não", barra o aluno
                if (!tem3D && !temDrone) {
                    if (statusTxt) statusTxt.innerHTML = "<span style='color: #ef4444;'>Acesso Pendente: Aguarde a liberação do administrador para os cursos.</span>";
                    auth.signOut();
                    localStorage.clear();
                    return;
                }

                // Cria o objeto de permissões estruturado
                const permissoes = {
                    impressao3D: tem3D,
                    drone: temDrone
                };

                // Grava as informações validadas com sucesso no navegador
                localStorage.setItem('usuario_nome', displayName || emailUsuario.split('@')[0]);
                localStorage.setItem('usuario_email', emailUsuario);
                localStorage.setItem('usuario_foto', photoURL);
                localStorage.setItem('permissoes_minerva', JSON.stringify(permissoes));

                // Autoriza a entrada para o painel
                window.location.href = "dashboard.html";

            } else {
                // Caso o e-mail não exista de forma alguma na planilha
                if (statusTxt) statusTxt.innerHTML = "<span style='color: #ef4444;'>Acesso Negado: Seu e-mail não está cadastrado na lista de alunos do Projeto Minerva.</span>";
                auth.signOut();
                localStorage.clear();
            }

        } catch (error) {
            console.error("Erro na validação da planilha: ", error);
            if (statusTxt) statusTxt.innerText = "Erro ao conectar com o banco de dados de permissões. Verifique sua API Key.";
            auth.signOut();
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            // Toda vez que a página inicia, se houver usuário, revalida direto na planilha
            verificarPermissoesPlanilha(user.email, user.displayName, user.photoURL);
        }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        auth.signInWithPopup(provider)
            .then((result) => {
                verificarPermissoesPlanilha(result.user.email, result.user.displayName, result.user.photoURL);
            })
            .catch((error) => {
                console.error("Erro no login: ", error);
                alert("Erro ao autenticar com o Google: " + error.message);
            });
    });
</script>
