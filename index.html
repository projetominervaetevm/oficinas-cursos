<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Minerva</title>
    <!-- RESTAURADO: Links oficiais de fontes corretos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- RESTAURADO: Link oficial do FontAwesome para trazer o ícone do cubo e do Google de volta -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>
    <div class="login-container">
        <i class="fas fa-cube"></i>
        <h1 class="login-title">PROJETO <span style="color: #00a3ff;">MINERVA</span></h1>
        
        <div style="margin-bottom: 25px; display: flex; justify-content: center;">
            <img src="./images/logominerva.png" alt="Logo Parceria FAETEC ETEVM" style="height: 50px; width: auto;">
        </div>
        
        <p class="login-subtitle">Faça login com sua conta Google para acessar seus cursos, oficinas e materiais técnicos.</p>
        
        <!-- Área de status para exibir as mensagens de retorno do seu Apps Script -->
        <p id="status-validacao" style="color: #ffb703; font-weight: 600; display: none; margin-bottom: 20px; font-size: 14px; line-height: 1.4; text-align: center; max-width: 320px;"></p>

        <button class="btn-google" id="login-btn">
            <i class="fab fa-google" style="color: #ea4335;"></i> Entrar com o Google
        </button>
        
        <div class="login-footer">Plataforma Maker • 2026</div>
    </div>

    <!-- Scripts CDN completos e oficiais do Firebase Auth (Compat) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <script>
        // Configuração do seu Firebase (Chaves originais do seu projeto)
        const firebaseConfig = {
            apiKey: "AIzaSyDnzxP7kc-qEKumUqyNAlVA_zCqgz3s4qU",
            authDomain: "://firebaseapp.com",
            projectId: "oficina-3d-minerva",
            storageBucket: "oficina-3d-minerva.firebasestorage.app",
            messagingSenderId: "241260901502",
            appId: "1:241260901502:web:63fb6e57a446eea876142f",
        };

        // Inicializa o Firebase Auth
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // URL do seu Google Apps Script Web App executando perfeitamente
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8u90Sq-JP1-iKfl4Z9C-uP8-i8dB_5jdBSHQ7TLkV25ENSfK3t0xnca70F2njPaoDcw/exec';

        // Função responsável por ler o Apps Script e validar as permissões
        async function verificarPermissoesPlanilha(emailUsuario, displayName, photoURL) {
            const statusTxt = document.getElementById('status-validacao');
            if (statusTxt) {
                statusTxt.style.display = "block";
                statusTxt.style.color = "#ffb703";
                statusTxt.innerText = "Verificando permissões na base da FAETEC...";
            }

            // Define um nome padrão caso a conta Google não possua displayName configurado
            const nomeAluno = displayName || emailUsuario.split('@')[0];

            // NOVIDADE: Agora enviamos o e-mail AND o nome do aluno codificados na URL para o Apps Script
            const url = `${APPS_SCRIPT_URL}?email=${encodeURIComponent(emailUsuario)}&nome=${encodeURIComponent(nomeAluno)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Se o Apps Script responder que não está autorizado (Aluno novo ou com cursos em "não")
                if (!data || data.autorizado === false) {
                    if (statusTxt) {
                        statusTxt.style.color = "#ef4444";
                        // Exibe dinamicamente o motivo exato retornado pelo seu script backend da planilha
                        statusTxt.innerHTML = `Acesso Retido:<br><span style='font-size:12px; font-weight:400; color:#94a3b8;'>${data.motivo || "Aguarde a liberação do administrador."}</span>`;
                    }
                    auth.signOut();
                    localStorage.clear();
                    return;
                }

                // Grava os dados validados com sucesso no cache local (localStorage) para uso no painel
                localStorage.setItem('usuario_nome', nomeAluno);
                localStorage.setItem('usuario_email', emailUsuario);
                localStorage.setItem('usuario_foto', photoURL);
                localStorage.setItem('permissoes_minerva', JSON.stringify(data.permissoes));

                // Avança com segurança para dentro do painel logado
                window.location.href = "dashboard.html";

            } catch (error) {
                console.error("Erro na comunicação com o Apps Script: ", error);
                if (statusTxt) {
                    statusTxt.style.color = "#ef4444";
                    statusTxt.innerText = "Erro ao conectar com a base de dados de permissões. Tente novamente.";
                }
                auth.signOut();
            }
        }

        // Monitor de persistência de sessão do Firebase
        auth.onAuthStateChanged(user => {
            if (user) {
                // Se o usuário já possuir sessão no navegador, força a revalidação imediata na planilha
                verificarPermissoesPlanilha(user.email, user.displayName, user.photoURL);
            }
        });

        // Evento de clique do botão para disparar o Pop-up de login do Google
        document.getElementById('login-btn').addEventListener('click', () => {
            auth.signInWithPopup(provider)
                .then((result) => {
                    // Após a autenticação bem-sucedida, repassa os dados coletados do Google para a validação
                    verificarPermissoesPlanilha(result.user.email, result.user.displayName, result.user.photoURL);
                })
                .catch((error) => {
                    console.error("Erro no login Google Auth: ", error);
                    alert("Erro ao autenticar com o Google: " + error.message);
                });
        });
    </script>
</body>
</html>
