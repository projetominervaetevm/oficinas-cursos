<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de Drones - Projeto Minerva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Urbanist:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>

    <nav class="navbar-curso">
        <div class="logo-group">
            <i class="fas fa-cube" style="color: #deff9a;"></i>
            <span>PROJETO MINERVA</span>
            <img src="logominerva.png" alt="Logo Parceria" class="logo-parceria">
        </div>
        <a href="dashboard.html" class="btn-voltar" style="background: #deff9a; color: #121926;">
            <i class="fas fa-arrow-left"></i> Voltar ao Painel
        </a>
    </nav>

    <div class="layout-container">
        <main class="content-frame-area">
            <iframe id="conteudo-frame" src="https://drive.google.com/embeddedfolder/id?id=SUA_PASTA_PADRAO_AQUI"></iframe>
        </main>

        <aside class="resources-sidebar">
            <div class="sidebar-title">Navegação do Curso</div>
            
            <button class="resource-btn active" onclick="carregarConteudo('https://drive.google.com/embeddedfolder/id?id=ID_DA_PASTA_DE_LEGISLACAO_DO_DRIVE', this)">
                <i class="fas fa-file-pdf color-pdf"></i>
                <div class="info">
                    <span class="title">Legislação e Manuais</span>
                    <span class="desc">Apostilas DECEA, ANAC e Checklists</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('https://drive.google.com/embeddedfolder/id?id=ID_DA_PASTA_DE_VIDEOS_DRONE_DO_DRIVE', this)">
                <i class="fab fa-youtube color-video"></i>
                <div class="info">
                    <span class="title">Aulas de Operação</span>
                    <span class="desc">Vídeos práticos de decolagem e voo</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('https://drive.google.com/embeddedfolder/id?id=ID_DA_PASTA_DE_DICAS_DRONE_DO_DRIVE', this)">
                <i class="fas fa-lightbulb color-dica"></i>
                <div class="info">
                    <span class="title">Segurança de Voo</span>
                    <span class="desc">Checklist essencial de satélites</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('COLOQUE_AQUI_O_LINK_DO_SEU_FORUM_DE_DRONES', this)">
                <i class="fas fa-comments color-forum"></i>
                <div class="info">
                    <span class="title">Fórum dos Pilotos</span>
                    <span class="desc">Espaço de discussão técnica</span>
                </div>
            </button>
        </aside>
    </div>

    <script>
        function carregarConteudo(url, elemento) {
            document.getElementById('conteudo-frame').src = url;
            document.querySelectorAll('.resource-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }
    </script>
</body>
</html>
