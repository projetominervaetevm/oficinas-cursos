<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Impressão 3D - Projeto Minerva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <nav class="navbar-curso">
        <div class="logo-group">
            <i class="fas fa-cube"></i>
            <span>PROJETO MINERVA</span>
            <img src="./images/logominerva.png" alt="Logo Parceria" class="logo-parceria">
        </div>
        <a href="dashboard.html" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Painel
        </a>
    </nav>

    <div class="layout-container">
        <main class="content-frame-area">
            <!-- CORREÇÃO: Adicionado sandbox e allow para compatibilidade e segurança -->
            <iframe id="conteudo-frame" src="./inicio-3d.html" allow="autoplay" sandbox="allow-scripts "></iframe id="conteudo-frame">
        </main>

        <aside class="resources-sidebar">
            <div class="sidebar-title">Navegação do Curso</div>
            
            <!-- CORREÇÃO: Nova estrutura oficial de URL de pastas do Google Drive -->
            <button class="resource-btn" onclick="carregarConteudo('https://drive.google.com/drive/folders/1KdrwBDiYi-5QUcLWu5vXEiPFwEM9jwyo?usp=drive_link', this)">
                <i class="fas fa-file-pdf color-pdf"></i>
                <div class="info">
                    <span class="title">Manuais Técnicos</span>
                    <span class="desc">Guias STL e Perfis do Cura</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('https://google.com', this)">
                <i class="fab fa-youtube color-video"></i>
                <div class="info">
                    <span class="title">Videoaulas Práticas</span>
                    <span class="desc">Demonstrações e calibração</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('https://google.com', this)">
                <i class="fas fa-lightbulb color-dica"></i>
                <div class="info">
                    <span class="title">Dicas e Macetes</span>
                    <span class="desc">Segredos de engenharia maker</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('LINK_DO_FORUM', this)">
                <i class="fas fa-comments color-forum"></i>
                <div class="info">
                    <span class="title">Fórum da Comunidade</span>
                    <span class="desc">Tire dúvidas com o grupo</span>
                </div>
            </button>
        </aside>
    </div>

    <script>
        function carregarConteudo(url, elemento) {
            // CORREÇÃO: Validação inteligente para alertar se colarem o link errado por engano
            if(url.includes('drive.google.com') && !url.includes('embeddedfolderview')) {
                alert('Atenção: Use o formato "embeddedfolderview?id=..." para evitar o bloqueio do Google.');
                return;
            }

            const iframe = document.getElementById('conteudo-frame');
            iframe.src = url;

            // Gerenciamento de classe ativa (Excelente lógica sua!)
            document.querySelectorAll('.resource-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }
    </script>
</body>
</html>
