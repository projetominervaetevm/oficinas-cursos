<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Impressão 3D - Projeto Minerva</title>
    <!-- Links de fontes e ícones restaurados com as URLs corretas de funcionamento -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <nav class="navbar-curso">
        <div class="logo-group">
            <i class="fas fa-cube"></i>
            <span>PROJETO MINERVA</span>
            <img src="./images/logominerva.png" alt="Logo Parceria" class="logo-parceria">
        </div>
        <a href="dashboard.html" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Painel
        </a>
    </nav>

    <div class="layout-container">
        <main class="content-frame-area">
            <!-- Iframe que mantém a página inicial padrão do curso -->
            <iframe id="conteudo-frame" src="./inicio-3d.html" allow="autoplay"></iframe>
        </main>

        <aside class="resources-sidebar">
            <div class="sidebar-title">Navegação do Curso</div>
            
            <!-- BOTÃO DE MANUAIS: Configurado com o seu link público direto do Drive -->
            <button class="resource-btn" onclick="carregarConteudo('https://drive.google.com/drive/folders/1KdrwBDiYi-5QUcLWu5vXEiPFwEM9jwyo', this)">
                <i class="fas fa-file-pdf color-pdf"></i>
                <div class="info">
                    <span class="title">Manuais Técnicos</span>
                    <span class="desc">Guias STL e Perfis do Cura</span>
                </div>
            </button>

            <!-- BOTÃO DE VÍDEOS: Substitua o link inteiro pelo link público da pasta correspondente -->
            <button class="resource-btn" onclick="carregarConteudo('https://google.com', this)">
                <i class="fab fa-youtube color-video"></i>
                <div class="info">
                    <span class="title">Videoaulas Práticas</span>
                    <span class="desc">Demonstrações e calibração</span>
                </div>
            </button>

            <!-- BOTÃO DE DICAS: Substitua o link inteiro pelo link público da pasta correspondente -->
            <button class="resource-btn" onclick="carregarConteudo('https://google.com', this)">
                <i class="fas fa-lightbulb color-dica"></i>
                <div class="info">
                    <span class="title">Dicas e Macetes</span>
                    <span class="desc">Segredos de engenharia maker</span>
                </div>
            </button>

            <!-- BOTÃO DO FÓRUM: Mantém o funcionamento normal dentro do iframe se o fórum permitir -->
            <button class="resource-btn" onclick="carregarConteudo('LINK_DO_FORUM', this)">
                <i class="fas fa-comments color-forum"></i>
                <div class="info">
                    <span class="title">Fórum da Comunidade</span>
                    <span class="desc">Tire dúvidas com o grupo</span>
                </div>
            </button>
        </aside>
    </div>

    <script>
        function carregarConteudo(url, elemento) {
            // Se o link pertencer ao Google Drive, abre em uma nova aba com segurança total
            if (url.includes('drive.google.com')) {
                window.open(url, '_blank', 'noopener,noreferrer');
            } else {
                // Se for um link comum ou interno, atualiza o iframe normalmente
                document.getElementById('conteudo-frame').src = url;
            }

            // Mantém a sua lógica excelente de destacar visualmente o botão clicado
            document.querySelectorAll('.resource-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }
    </script>
</body>
</html>
