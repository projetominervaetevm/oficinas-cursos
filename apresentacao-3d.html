<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Impressão 3D - Projeto Minerva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background-color: #121926; color: #f1f5f9;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Navbar Superior */
        .navbar-curso {
            background-color: #1a2332; height: 70px; min-height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-group .fa-cube { color: #00a3ff; font-size: 22px; }
        .btn-voltar {
            background: #00a3ff; color: white; text-decoration: none; padding: 8px 16px;
            border-radius: 6px; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-voltar:hover { background-color: #008be0; }

        /* Estrutura Dinâmica */
        .layout-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* Frame Dinâmico à Esquerda */
        .content-frame-area { flex-grow: 1; height: 100%; background-color: #121926; border: none; }
        iframe { width: 100%; height: 100%; border: none; background: #121926; }
        
        /* Menu Fixo à Direita */
        .resources-sidebar {
            width: 380px; min-width: 380px; background-color: #1a2332;
            border-left: 1px solid rgba(255,255,255,0.05); padding: 30px;
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .sidebar-title { font-family: 'Urbanist', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }
        
        /* Botões Interativos */
        .resource-btn {
            background-color: #121926; border: 1px solid rgba(255,255,255,0.05);
            padding: 16px; border-radius: 12px; color: white;
            display: flex; align-items: center; gap: 15px; transition: all 0.2s ease; cursor: pointer;
            text-align: left; width: 100%;
        }
        .resource-btn:hover, .resource-btn.active { border-color: #00a3ff; background-color: rgba(0, 163, 255, 0.07); transform: translateX(-3px); }
        .resource-btn i { font-size: 20px; width: 25px; text-align: center; }
        .resource-btn .info { display: flex; flex-direction: column; }
        .resource-btn .info .title { font-weight: 600; font-size: 14px; }
        .resource-btn .info .desc { font-size: 12px; color: #64748b; margin-top: 2px; }
        
        .color-pdf { color: #ef4444; }
        .color-video { color: #ff0000; }
        .color-dica { color: #eab308; }
        .color-forum { color: #10b981; }
    </style>
</head>
<body>

    <nav class="navbar-curso">
        <div class="logo-group">
            <i class="fas fa-cube"></i>
            <span style="color: white; font-weight: bold; font-family: 'Urbanist';">PROJETO MINERVA • IMPRESSÃO 3D</span>
        </div>
        <a href="dashboard.html" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Painel
        </a>
    </nav>

    <div class="layout-container">
        <main class="content-frame-area">
            <iframe id="conteudo-frame" src="https://drive.google.com/embeddedfolder/id?id=SUA_PASTA_PADRAO_AQUI"></iframe>
        </main>

        <aside class="resources-sidebar">
            <div class="sidebar-title">Navegação do Curso</div>
            
            <button class="resource-btn active" onclick="carregarConteudo('https://drive.google.com/embeddedfolder/id?id=ID_DA_PASTA_DE_PDFS_DO_DRIVE', this)">
                <i class="fas fa-file-pdf color-pdf"></i>
                <div class="info">
                    <span class="title">Manuais Técnicos</span>
                    <span class="desc">Guias STL e Perfis do Cura</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('https://drive.google.com/embeddedfolder/id?id=ID_DA_PASTA_DE_VIDEOS_DO_DRIVE', this)">
                <i class="fab fa-youtube color-video"></i>
                <div class="info">
                    <span class="title">Videoaulas Práticas</span>
                    <span class="desc">Demonstrações e calibração</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('https://drive.google.com/embeddedfolder/id?id=ID_DA_PASTA_DE_DICAS_DO_DRIVE', this)">
                <i class="fas fa-lightbulb color-dica"></i>
                <div class="info">
                    <span class="title">Dicas e Macetes</span>
                    <span class="desc">Segredos de engenharia maker</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('COLOQUE_AQUI_O_LINK_DO_SEU_FORUM_OU_PLANILHA', this)">
                <i class="fas fa-comments color-forum"></i>
                <div class="info">
                    <span class="title">Fórum da Comunidade</span>
                    <span class="desc">Tire dúvidas com o grupo</span>
                </div>
            </button>
        </aside>
    </div>

    <script>
        // Função que altera o link do frame sem recarregar a página inteira
        function carregarConteudo(url, elemento) {
            document.getElementById('conteudo-frame').src = url;
            
            // Remove a classe ativa de todos os botões e adiciona no clicado
            document.querySelectorAll('.resource-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }
    </script>
</body>
</html>
