
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Impressão 3D - Projeto Minerva</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>

    <nav class="navbar-curso">
        <div class="logo-group">
            <i class="fas fa-cube"></i>
            <span>PROJETO MINERVA</span>
            <img src="./images/logominerva.png" alt="Logo Parceria" class="logo-parceria">
        </div>
        <a href="dashboard.html" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Painel
        </a>
    </nav>

    <div class="layout-container">
        <main class="content-frame-area">
            <iframe id="conteudo-frame" src="./inicio-3d.html" allow="autoplay"></iframe>
        </main>

        <aside class="resources-sidebar">
            <div class="sidebar-title">Navegação do Curso</div>
            
            <button class="resource-btn active" onclick="carregarConteudo('./manuais.html', this)">
                <i class="fas fa-file-pdf color-pdf"></i>
                <div class="info">
                    <span class="title">Manuais Técnicos</span>
                    <span class="desc">Guias STL e Perfis do Cura</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('./videos.html', this)">
                <i class="fab fa-youtube color-video"></i>
                <div class="info">
                    <span class="title">Videoaulas Práticas</span>
                    <span class="desc">Demonstrações e calibração</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('./dicas.html', this)">
                <i class="fas fa-lightbulb color-dica"></i>
                <div class="info">
                    <span class="title">Dicas e Macetes</span>
                    <span class="desc">Segredos de engenharia maker</span>
                </div>
            </button>

            <button class="resource-btn" onclick="carregarConteudo('LINK_DO_FORUM', this)">
                <i class="fas fa-comments color-forum"></i>
                <div class="info">
                    <span class="title">Fórum da Comunidade</span>
                    <span class="desc">Tire dúvidas com o grupo</span>
                </div>
            </button>
        </aside>
    </div>

    <script>
        // SCRIPT DE SEGURANÇA: Bloqueia o acesso se não tiver a permissão na planilha
        (function verificarAcessoCurso() {
            const email = localStorage.getItem('usuario_email');
            const permsRaw = localStorage.getItem('permissoes_minerva');
            
            if (!email || !permsRaw) {
                window.location.href = "index.html";
                return;
            }
            
            const permissoes = JSON.parse(permsRaw);
            // Verifica as duas grafias possíveis de retorno para evitar conflitos
            if (permissoes.impressao3D !== true && permissoes.impressao3d !== true) {
                alert("Acesso negado: Você não tem permissão para acessar esta oficina.");
                window.location.href = "dashboard.html";
            }
        })();

        // Função de controle do Iframe
        function carregarConteudo(url, elemento) {
            document.getElementById('conteudo-frame').src = url;
            document.querySelectorAll('.resource-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }
    </script>
</body>
</html>
